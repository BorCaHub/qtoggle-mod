name: Build Mod

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.5.1

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Resolve dependencies first
        run: ./gradlew dependencies --configuration compileClasspath

      - name: Dump KeyMapping and Category
        run: |
          JAR=$(find ~/.gradle/caches -name "minecraft-merged-deobf*.jar" | head -1)
          echo "JAR: $JAR"
          echo "=== KeyMapping ==="
          javap -p -classpath "$JAR" net.minecraft.client.KeyMapping
          echo "=== Category ==="
          javap -p -classpath "$JAR" 'net.minecraft.client.KeyMapping$Category'

      - name: Build mod
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtoggle-jar
          path: build/libs/*.jar
