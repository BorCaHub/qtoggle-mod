name: Build Mod

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.5.1

      - name: Beri izin eksekusi gradlew
        run: chmod +x ./gradlew

      - name: Dump KeyMapping API
        run: ./gradlew dumpKeyMapping

      - name: Cek isi Minecraft jar
        run: |
          # Cari minecraft jar di gradle cache
          find ~/.gradle/caches -name "minecraft-26*.jar" 2>/dev/null | head -5
          find ~/.gradle/caches -name "*.jar" | grep -i minecraft | head -10
          
      - name: Dump class KeyMapping
        run: |
          JAR=$(find ~/.gradle/caches -name "*.jar" | grep -i minecraft | head -1)
          echo "JAR ditemukan: $JAR"
          # List semua class di jar
          jar tf "$JAR" | grep -i keymapping
          # Dump method KeyMapping
          javap -p "$JAR!/net/minecraft/client/KeyMapping.class" 2>/dev/null || \
          javap -classpath "$JAR" -p net.minecraft.client.KeyMapping 2>/dev/null || \
          echo "Coba cara lain..."
          # Cari file .class langsung
          find ~/.gradle/caches -name "KeyMapping.class" 2>/dev/null | head -5

      - name: Build mod
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtoggle-jar
          path: build/libs/*.jar
